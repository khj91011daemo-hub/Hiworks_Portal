<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hiworks 통합 포털</title>
    <style>
        :root {
            --brand-660c: #0067B1;
            --brand-646c: #3E72A2;
            --gold: #C5A059;
            --sidebar-width: 280px; /* 요청하신 280px 설정 */
        }

        body { margin: 0; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        .tab-container {
            display: flex;
            background: var(--brand-660c);
            height: 45px;
            align-items: center;
            position: relative;
            z-index: 1000;
            padding: 0 5px;
            overflow: visible;
        }

        .tab-bar { 
            display: flex; 
            height: 100%; 
            flex: 1; 
            align-items: center;
            overflow: visible;
        }

        .dropdown { position: relative; height: 100%; display: flex; align-items: center; }

        .dropbtn {
            color: #ffffff; padding: 0 15px; cursor: pointer; font-size: 14px;
            height: 100%; display: flex; align-items: center; white-space: nowrap;
        }

        .dropdown:hover { background: var(--brand-646c); }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 45px;
            left: 0;
            background-color: white;
            min-width: 140px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 9999;
            border-radius: 0 0 4px 4px;
        }

        .dropdown:hover .dropdown-content { display: block; }

        .dropdown-content div {
            color: var(--brand-660c); padding: 12px 15px; cursor: pointer;
            font-size: 13px; border-bottom: 1px solid #eee; white-space: nowrap;
        }

        .dropdown-content div:hover { background-color: #f1f1f1; }

        .tab-item {
            display: flex; align-items: center; color: #ffffff; padding: 0 15px;
            cursor: pointer; font-size: 14px; height: 100%; white-space: nowrap;
        }
        .tab-item:hover { background: var(--brand-646c); }

        /* 세션 배지 */
        .session-badge {
            display: flex; align-items: center; gap: 6px; 
            background: #10B981; color: #ffffff; 
            padding: 4px 10px; border-radius: 14px; 
            font-size: 12px; font-weight: bold; white-space: nowrap; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            margin: 0 5px;
        }
        .session-dot { width: 8px; height: 8px; background-color: #ffffff; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* 안드로이드 스타일 토글 스위치 */
        .toggle-container {
            display: flex; align-items: center; gap: 8px; margin: 0 10px; color: white; font-size: 13px; font-weight: bold;
        }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--brand-646c); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-external {
            background: var(--gold); color: white; padding: 0 10px; font-size: 12px;
            cursor: pointer; height: 28px; display: flex; align-items: center;
            margin: 0 5px; border-radius: 4px; white-space: nowrap; font-weight: bold;
            flex-shrink: 0;
        }

        /* iframe 레이아웃 제어 */
        .frame-wrapper {
            width: 100%;
            flex-grow: 1;
            overflow: hidden;
            position: relative;
        }

        #content-frame { 
            width: 100%; 
            height: 100%;
            border: none; 
            display: block;
            transition: margin-left 0.3s ease, width 0.3s ease, transform 0.2s ease;
            transform-origin: 0 0;
        }

        /* 스위치 켜짐(사이드바 끔) 상태 */
        .sidebar-hidden #content-frame {
            margin-left: calc(-1 * var(--sidebar-width));
            width: calc(100% + var(--sidebar-width));
        }

        /* 줌 컨트롤 버튼 (우하단) */
        .zoom-controls { 
            position: fixed; bottom: 20px; right: 20px; 
            display: flex; gap: 10px; z-index: 2000; 
        }
        .zoom-controls button {
            width: 45px; height: 45px; border-radius: 50%; border: none;
            background: rgba(0, 0, 0, 0.4); color: white; font-size: 20px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px); transition: background 0.2s;
        }
        .zoom-controls button:active { background: rgba(0, 0, 0, 0.7); }

        /* 사전 로그인 안내 모달 */
        .login-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .login-modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .login-modal-box {
            background: #ffffff;
            width: 420px;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .login-modal-box h3 {
            margin-top: 0;
            color: #0067B1;
            font-size: 20px;
        }
        .login-modal-box p {
            color: #475569;
            font-size: 14px;
            line-height: 1.6;
            margin: 15px 0 25px;
        }
        .btn-login-start {
            background: #0067B1;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .btn-login-start:hover {
            background: #00528e;
        }
    </style>
</head>
<body>
    <div class="tab-container">
        <div class="tab-bar">
            <!-- 기존 메뉴 구조 유지 -->
            <div class="dropdown"><div class="dropbtn">메일 ▾</div>
                <div class="dropdown-content">
                    <div onclick="loadPage('https://mail.office.hiworks.com/daemo.co.kr/')">개인메일</div>
                    <div onclick="loadPage('https://team-mail.office.hiworks.com/')">공용메일</div>
                </div>
            </div>
            <div class="dropdown"><div class="dropbtn">전자결재 ▾</div>
                <div class="dropdown-content">
                    <div onclick="loadPage('https://approval.office.hiworks.com/daemo.co.kr/approval/document/lists/A')">진행 중</div>
                    <div onclick="loadPage('https://approval.office.hiworks.com/daemo.co.kr/approval/document/box/all')">내문서</div>
                    <div onclick="loadPage('https://approval.office.hiworks.com/daemo.co.kr/approval/document/box/temp')">임시저장</div>
                </div>
            </div>
            <div class="dropdown"><div class="dropbtn">근무 ▾</div>
                <div class="dropdown-content">
                    <div onclick="loadPage('https://hr-work.office.hiworks.com/personal/my-status/vacation')">휴가 현황</div>
                    <div onclick="loadPage('https://hr-work.office.hiworks.com/approval/vacation-apply')">휴가신청</div>
                    <div onclick="loadPage('https://hr-work.office.hiworks.com/approval/overwork')">연장근무</div>
                    <div onclick="loadPage('https://hr-work.office.hiworks.com/approval/work-holiday')">휴(무)일근무</div>
                </div>
            </div>
            <div class="dropdown"><div class="dropbtn">예약 ▾</div>
                <div class="dropdown-content">
                    <div onclick="loadPage('https://booking.office.hiworks.com/daemo.co.kr/booking/bookingResource/resourceList/841')">회의실</div>
                    <div onclick="loadPage('https://booking.office.hiworks.com/daemo.co.kr/booking/bookingResource/resourceList/884')">노트북</div>
                    <div onclick="loadPage('https://booking.office.hiworks.com/daemo.co.kr/booking/bookingResource/resourceList/843')">차량</div>
                </div>
            </div>
            <div class="tab-item" onclick="loadPage('https://scheduler.office.hiworks.com/calendar')">일정</div>
            <div class="dropdown"><div class="dropbtn">게시판 ▾</div>
                <div class="dropdown-content">
                    <div onclick="loadPage('https://boards.office.hiworks.com/board/postlist/2540?page=1')">공지사항</div>
                    <div onclick="loadPage('https://boards.office.hiworks.com/board/postlist/2750?page=1')">주간메뉴</div>
                </div>
            </div>
        </div>

        <!-- 세션 자동 연장 가동 배지 -->
        <div class="session-badge" title="로그인 후 세션이 끊기지 않도록 3분마다 백그라운드로 자동 연장합니다">
            <span class="session-dot"></span> 세션 자동 연장
        </div>

        <!-- 안드로이드 스타일 토글 스위치 -->
        <div class="toggle-container">
            <label class="switch">
                <input type="checkbox" id="sidebar-toggle" onchange="toggleSidebar(this.checked)">
                <span class="slider"></span>
            </label>
            <span id="status-text">사이드바 켬</span>
        </div>
        
        <div class="btn-external" style="background: #10B981;" onclick="openLoginPopup()" title="로그인 화면으로 이동합니다">🔑 1회 로그인</div>
        <div class="btn-external" onclick="openExternal()">외부에서 열기</div>
    </div>
    
    <div id="frame-wrapper" class="frame-wrapper">
        <iframe id="content-frame" src="https://login.office.hiworks.com/daemo.co.kr" sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-modals allow-downloads allow-storage-access-by-user-activation"></iframe>
    </div>

    <!-- 우하단 줌 컨트롤 -->
    <div class="zoom-controls">
        <button onclick="changeZoom(-0.1)">-</button>
        <button onclick="changeZoom(0.1)">+</button>
    </div>

    <!-- 최초 사전 로그인 안내 대형 모달 -->
    <div id="login-modal" class="login-modal-overlay">
        <div class="login-modal-box">
            <h3>🔑 하이웍스 로그인</h3>
            <p>팀즈 앱 내에서 로그인 상태를 유지하려면<br><strong>로그인</strong>이 필요합니다.<br><br>아래 버튼을 눌러 로그인 화면으로 이동해주세요.</p>
            <button class="btn-login-start" onclick="openLoginPopup()">로그인 화면으로 이동</button>
        </div>
    </div>

    <script>
        const iframe = document.getElementById('content-frame');
        const frameWrapper = document.getElementById('frame-wrapper');
        const statusText = document.getElementById('status-text');
        const loginModal = document.getElementById('login-modal');
        let currentScale = 1.0;

        // 저장된 마지막 URL 복원
        const savedUrl = localStorage.getItem('hiworks_last_url');
        if (savedUrl) {
            iframe.src = savedUrl;
        }
        
        function loadPage(url) { 
            iframe.src = url; 
            try {
                localStorage.setItem('hiworks_last_url', url);
            } catch(e) {}
        }

        // ==========================================
        // 🔑 팝업 대신 iframe 내부에서 직접 로그인 진행하도록 수정
        // ==========================================
        function openLoginPopup() {
            loginModal.classList.remove('active');
            loadPage('https://login.office.hiworks.com/daemo.co.kr');
        }

        // 앱 처음 실행 시 로그인 여부 확인 모달 표시
        window.addEventListener('load', () => {
            setTimeout(() => {
                const isLogged = localStorage.getItem('hiworks_logged_in');
                if (!isLogged) {
                    loginModal.classList.add('active');
                }
            }, 600);
        });
        
        function openExternal() { 
            window.open(iframe.src, '_blank'); 
        }
        
        function toggleSidebar(isHidden) {
            if (isHidden) {
                frameWrapper.classList.add('sidebar-hidden');
                statusText.innerText = '사이드바 끔';
            } else {
                frameWrapper.classList.remove('sidebar-hidden');
                statusText.innerText = '사이드바 켬';
            }
        }

        function changeZoom(delta) {
            currentScale = Math.min(Math.max(0.5, currentScale + delta), 2.0);
            iframe.style.transform = `scale(${currentScale})`;
        }

        // ==========================================
        // 🔒 로그인 세션 자동 유지 (Keep-Alive Ping)
        // ==========================================
        function keepSessionAlive() {
            // 1. fetch 기반 핑 (하이웍스 세션 유지)
            fetch('https://office.hiworks.com/', { mode: 'no-cors', cache: 'no-cache', credentials: 'include' }).catch(() => {});
            fetch('https://login.office.hiworks.com/daemo.co.kr', { mode: 'no-cors', cache: 'no-cache', credentials: 'include' }).catch(() => {});
            
            // 2. 픽셀 이미지 기반 세션 터치
            const pingImg = new Image();
            pingImg.src = 'https://office.hiworks.com/favicon.ico?t=' + new Date().getTime();
        }

        // 3분마다 자동 실행
        setInterval(keepSessionAlive, 3 * 60 * 1000);
        // 초기 실행
        setTimeout(keepSessionAlive, 5000);
    </script>
</body>
</html>
