<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DAEMO Hiworks Connector v2.3.1</title>
    <style>
        :root {
            --brand-660c: #0067B1;
            --brand-646c: #3E72A2;
            --gold: #C5A059;
            --sidebar-width: 280px;
        }

        body { margin: 0; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; background: #fff; }

        .tab-container {
            display: flex;
            background: var(--brand-660c);
            height: 45px;
            align-items: center;
            position: relative;
            z-index: 1000;
            padding: 0 5px;
            box-sizing: border-box;
            width: 100%;
        }

        /* 왼쪽 고정 기본 메뉴 바 */
        .tab-bar { 
            display: flex; 
            height: 100%; 
            align-items: center;
            flex-shrink: 0;
            position: relative;
            z-index: 1002;
        }

        .dropdown { position: relative; height: 100%; display: flex; align-items: center; }

        .dropbtn {
            color: #ffffff; padding: 0 12px; cursor: pointer; font-size: 13px;
            height: 100%; display: flex; align-items: center; white-space: nowrap;
        }

        .dropdown:hover { background: var(--brand-646c); }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 45px;
            left: 0;
            background-color: white;
            min-width: 140px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 9999;
            border-radius: 0 0 4px 4px;
        }

        .dropdown:hover .dropdown-content { display: block; }

        .dropdown-content div {
            color: var(--brand-660c); padding: 12px 15px; cursor: pointer;
            font-size: 13px; border-bottom: 1px solid #eee; white-space: nowrap;
        }

        .dropdown-content div:hover { background-color: #f1f1f1; }

        .tab-item {
            display: flex; align-items: center; color: #ffffff; padding: 0 12px;
            cursor: pointer; font-size: 13px; height: 100%; white-space: nowrap;
        }
        .tab-item:hover { background: var(--brand-646c); }

        /* 중앙 동적 탭 영역 (스크롤 가능) */
        #dynamic-tabs-area {
            display: flex;
            align-items: center;
            gap: 4px;
            overflow-x: auto;
            overflow-y: hidden;
            flex-grow: 1;
            height: 100%;
            padding: 0 8px;
            white-space: nowrap;
        }
        #dynamic-tabs-area::-webkit-scrollbar { height: 3px; }
        #dynamic-tabs-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.4); border-radius: 3px; }

        .dynamic-tab {
            display: inline-flex; align-items: center; background: #2C5282; color: #ffffff;
            padding: 0 10px; height: 30px; border-radius: 4px; font-size: 12px;
            cursor: pointer; gap: 6px; border: 1px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }
        .dynamic-tab.active { background: var(--gold); font-weight: bold; }
        .dynamic-tab .close-btn {
            font-size: 14px; width: 16px; height: 16px; display: flex; align-items: center;
            justify-content: center; border-radius: 50%; opacity: 0.7;
        }
        .dynamic-tab .close-btn:hover { background: rgba(0,0,0,0.2); opacity: 1; }

        /* 우측 고정 컨트롤 영역 */
        .controls-group {
            display: flex; align-items: center; gap: 8px; flex-shrink: 0;
            padding-left: 5px; background: var(--brand-660c);
            z-index: 1002;
        }

        /* 안드로이드 스타일 토글 스위치 */
        .toggle-container {
            display: flex; align-items: center; gap: 6px; color: white; font-size: 12px; font-weight: bold;
        }
        .switch { position: relative; display: inline-block; width: 36px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 18px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--brand-646c); }
        input:checked + .slider:before { transform: translateX(18px); }

        .btn-external {
            background: var(--gold); color: white; padding: 0 8px; font-size: 11px;
            cursor: pointer; height: 26px; display: flex; align-items: center;
            border-radius: 4px; white-space: nowrap; font-weight: bold;
        }

        /* iframe 레이아웃 제어 */
        .frame-wrapper {
            width: 100%;
            flex-grow: 1;
            overflow: hidden;
            position: relative;
        }

        .content-frame { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: none; display: none;
            transition: margin-left 0.3s ease, width 0.3s ease, transform 0.2s ease;
            transform-origin: 0 0;
        }
        .content-frame.active { display: block; }

        /* 스위치 켜짐(사이드바 끔) 상태 */
        .sidebar-hidden .content-frame {
            margin-left: calc(-1 * var(--sidebar-width));
            width: calc(100% + var(--sidebar-width));
        }

        /* 줌 컨트롤 버튼 (우하단) */
        .zoom-controls { 
            position: fixed; bottom: 20px; right: 20px; 
            display: flex; gap: 10px; z-index: 2000; 
        }
        .zoom-controls button {
            width: 45px; height: 45px; border-radius: 50%; border: none;
            background: rgba(0, 0, 0, 0.4); color: white; font-size: 20px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px); transition: background 0.2s;
        }
        .zoom-controls button:active { background: rgba(0, 0, 0, 0.7); }
    </style>
</head>
<body>
    <div class="tab-container">
        <!-- 1. 고정 기본 메뉴 바 -->
        <div class="tab-bar">
            <div class="dropdown"><div class="dropbtn">메일 ▾</div>
                <div class="dropdown-content">
                    <div onclick="openPage('https://mail.office.hiworks.com/daemo.co.kr/', '개인메일')">개인메일</div>
                    <div onclick="openPage('https://team-mail.office.hiworks.com/', '공용메일')">공용메일</div>
                </div>
            </div>
            <div class="dropdown"><div class="dropbtn">전자결재 ▾</div>
                <div class="dropdown-content">
                    <div onclick="openPage('https://approval.office.hiworks.com/daemo.co.kr/approval/document/lists/A', '진행 중')">진행 중</div>
                    <div onclick="openPage('https://approval.office.hiworks.com/daemo.co.kr/approval/document/box/all', '내문서')">내문서</div>
                    <div onclick="openPage('https://approval.office.hiworks.com/daemo.co.kr/approval/document/box/temp', '임시저장')">임시저장</div>
                </div>
            </div>
            <div class="dropdown"><div class="dropbtn">근무 ▾</div>
                <div class="dropdown-content">
                    <div onclick="openPage('https://hr-work.office.hiworks.com/personal/my-status/vacation', '휴가 현황')">휴가 현황</div>
                    <div onclick="openPage('https://hr-work.office.hiworks.com/approval/vacation-apply', '휴가신청')">휴가신청</div>
                    <div onclick="openPage('https://hr-work.office.hiworks.com/approval/overwork', '연장근무')">연장근무</div>
                    <div onclick="openPage('https://hr-work.office.hiworks.com/approval/work-holiday', '휴(무)일근무')">휴(무)일근무</div>
                </div>
            </div>
            <div class="dropdown"><div class="dropbtn">예약 ▾</div>
                <div class="dropdown-content">
                    <div onclick="openPage('https://booking.office.hiworks.com/daemo.co.kr/booking/bookingResource/resourceList/841', '회의실')">회의실</div>
                    <div onclick="openPage('https://booking.office.hiworks.com/daemo.co.kr/booking/bookingResource/resourceList/884', '노트북')">노트북</div>
                    <div onclick="openPage('https://booking.office.hiworks.com/daemo.co.kr/booking/bookingResource/resourceList/843', '차량')">차량</div>
                </div>
            </div>
            <div class="tab-item" onclick="openPage('https://scheduler.office.hiworks.com/calendar', '일정')">일정</div>
            <div class="dropdown"><div class="dropbtn">게시판 ▾</div>
                <div class="dropdown-content">
                    <div onclick="openPage('https://boards.office.hiworks.com/board/postlist/2540?page=1', '공지사항')">공지사항</div>
                    <div onclick="openPage('https://boards.office.hiworks.com/board/postlist/2750?page=1', '주간메뉴')">주간메뉴</div>
                </div>
            </div>
        </div>

        <!-- 2. 추가되는 동적 탭들이 들어가는 공간 (가로 스크롤 지원) -->
        <div id="dynamic-tabs-area"></div>

        <!-- 3. 우측 컨트롤 영역 (사이드바 토글 및 외부열기) -->
        <div class="controls-group">
            <div class="toggle-container">
                <label class="switch">
                    <input type="checkbox" id="sidebar-toggle" onchange="toggleSidebar(this.checked)">
                    <span class="slider"></span>
                </label>
                <span id="status-text">사이드바 켬</span>
            </div>
            <div class="btn-external" onclick="openExternal()">외부에서 열기</div>
        </div>
    </div>
    
    <div id="frame-wrapper" class="frame-wrapper"></div>

    <!-- 우하단 줌 컨트롤 -->
    <div class="zoom-controls">
        <button onclick="changeZoom(-0.1)">-</button>
        <button onclick="changeZoom(0.1)">+</button>
    </div>

    <script>
        const frameWrapper = document.getElementById('frame-wrapper');
        const dynamicTabsArea = document.getElementById('dynamic-tabs-area');
        const statusText = document.getElementById('status-text');
        
        let tabs = [];
        let activeTabId = null;
        let currentScale = 1.0;
        let tabCounter = 0;

        // 초기 앱 실행 시 기본 페이지 로드
        const savedUrl = localStorage.getItem('hiworks_last_url') || 'https://login.office.hiworks.com/daemo.co.kr';
        openPage(savedUrl, '포털 메인');

        function openPage(url, title) {
            let existingTab = tabs.find(t => t.url === url);
            if (existingTab) {
                switchTab(existingTab.id);
                return;
            }

            tabCounter++;
            const tabId = 'tab-' + tabCounter;
            
            tabs.push({ id: tabId, url: url, title: title || '페이지' });

            const iframe = document.createElement('iframe');
            iframe.id = tabId;
            iframe.className = 'content-frame';
            iframe.src = url;
            // 외부 새창 팝업 원천 차단 유지
            iframe.setAttribute('sandbox', 'allow-forms allow-scripts allow-same-origin allow-modals allow-downloads allow-storage-access-by-user-activation');
            
            iframe.onload = function() {
                try {
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    iframeDoc.querySelectorAll('a').forEach(anchor => {
                        anchor.addEventListener('click', function(e) {
                            const targetHref = this.href;
                            const targetVal = this.getAttribute('target');
                            if (targetHref && (targetVal === '_blank' || targetHref.startsWith('http'))) {
                                e.preventDefault();
                                openPage(targetHref, '상세 페이지');
                            }
                        });
                    });
                } catch(e) {}
            };

            frameWrapper.appendChild(iframe);

            const tabEl = document.createElement('div');
            tabEl.className = 'dynamic-tab';
            tabEl.id = 'btn-' + tabId;
            tabEl.innerHTML = `<span onclick="switchTab('${tabId}')" style="max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${title}</span><span class="close-btn" onclick="closeTab(event, '${tabId}')">&times;</span>`;
            dynamicTabsArea.appendChild(tabEl);

            switchTab(tabId);

            try {
                localStorage.setItem('hiworks_last_url', url);
            } catch(e) {}
        }

        function switchTab(tabId) {
            activeTabId = tabId;

            document.querySelectorAll('.content-frame').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.dynamic-tab').forEach(t => t.classList.remove('active'));

            const targetIframe = document.getElementById(tabId);
            const targetBtn = document.getElementById('btn-' + tabId);

            if (targetIframe) targetIframe.classList.add('active');
            if (targetBtn) {
                targetBtn.classList.add('active');
                targetBtn.scrollIntoView({ behavior: 'smooth', inline: 'nearest' });
            }

            const currentTabObj = tabs.find(t => t.id === tabId);
            if (currentTabObj) {
                try {
                    localStorage.setItem('hiworks_last_url', currentTabObj.url);
                } catch(e) {}
            }
        }

        function closeTab(event, tabId) {
            event.stopPropagation();

            const tabIndex = tabs.findIndex(t => t.id === tabId);
            if (tabIndex === -1) return;

            const targetIframe = document.getElementById(tabId);
            const targetBtn = document.getElementById('btn-' + tabId);
            if (targetIframe) targetIframe.remove();
            if (targetBtn) targetBtn.remove();

            tabs.splice(tabIndex, 1);

            if (activeTabId === tabId) {
                if (tabs.length > 0) {
                    const nextTab = tabs[tabs.length - 1];
                    switchTab(nextTab.id);
                } else {
                    openPage('https://login.office.hiworks.com/daemo.co.kr', '로그인');
                }
            }
        }

        function openExternal() { 
            const activeIframe = document.getElementById(activeTabId);
            if (activeIframe) {
                window.open(activeIframe.src, '_blank'); 
            }
        }
        
        function toggleSidebar(isHidden) {
            const isSidebarHidden = frameWrapper.classList.toggle('sidebar-hidden', isHidden);
            statusText.innerText = isSidebarHidden ? '사이드바 끔' : '사이드바 켬';
        }

        function changeZoom(delta) {
            currentScale = Math.min(Math.max(0.5, currentScale + delta), 2.0);
            document.querySelectorAll('.content-frame').forEach(f => {
                f.style.transform = `scale(${currentScale})`;
            });
        }
    </script>
</body>
</html>
