<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hiworks 통합 포털</title>
    <style>
        :root {
            --brand-660c: #0067B1;
            --brand-646c: #3E72A2;
            --gold: #C5A059;
            --sidebar-width: 280px; /* 요청하신 280px 설정 */
        }

        body { margin: 0; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        .tab-container {
            display: flex;
            background: var(--brand-660c);
            height: 45px;
            align-items: center;
            position: relative;
            z-index: 1000;
            padding: 0 5px;
            overflow: visible;
        }

        .tab-bar { 
            display: flex; 
            height: 100%; 
            flex: 1; 
            align-items: center;
            overflow: visible;
        }

        .dropdown { position: relative; height: 100%; display: flex; align-items: center; }

        .dropbtn {
            color: #ffffff; padding: 0 15px; cursor: pointer; font-size: 14px;
            height: 100%; display: flex; align-items: center; white-space: nowrap;
        }

        .dropdown:hover { background: var(--brand-646c); }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 45px;
            left: 0;
            background-color: white;
            min-width: 140px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 9999;
            border-radius: 0 0 4px 4px;
        }

        .dropdown:hover .dropdown-content { display: block; }

        .dropdown-content div {
            color: var(--brand-660c); padding: 12px 15px; cursor: pointer;
            font-size: 13px; border-bottom: 1px solid #eee; white-space: nowrap;
        }

        .dropdown-content div:hover { background-color: #f1f1f1; }

        .tab-item {
            display: flex; align-items: center; color: #ffffff; padding: 0 15px;
            cursor: pointer; font-size: 14px; height: 100%; white-space: nowrap;
        }
        .tab-item:hover { background: var(--brand-646c); }

        /* 안드로이드 스타일 토글 스위치 */
        .toggle-container {
            display: flex; align-items: center; gap: 8px; margin: 0 10px; color: white; font-size: 13px; font-weight: bold;
        }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--brand-646c); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-external {
            background: var(--gold); color: white; padding: 0 10px; font-size: 12px;
            cursor: pointer; height: 28px; display: flex; align-items: center;
            margin: 0 5px; border-radius: 4px; white-space: nowrap; font-weight: bold;
            flex-shrink: 0;
        }

        /* iframe 레이아웃 제어 */
        .frame-wrapper {
            width: 100%;
            flex-grow: 1;
            overflow: hidden;
            position: relative;
        }

        #content-frame { 
            width: 100%; 
            height: 100%;
            border: none; 
            display: block;
            transition: margin-left 0.3s ease, width 0.3s ease, transform 0.2s ease;
            transform-origin: 0 0;
        }

        /* 스위치 켜짐(사이드바 끔) 상태 */
        .sidebar-hidden #content-frame {
            margin-left: calc(-1 * var(--sidebar-width));
            width: calc(100% + var(--sidebar-width));
        }

        /* 줌 컨트롤 버튼 (우하단) */
        .zoom-controls { 
            position: fixed; bottom: 20px; right: 20px; 
            display: flex; gap: 10px; z-index: 2000; 
        }
        .zoom-controls button {
            width: 45px; height: 45px; border-radius: 50%; border: none;
            background: rgba(0, 0, 0, 0.4); color: white; font-size: 20px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px); transition: background 0.2s;
        }
        .zoom-controls button:active { background: rgba(0, 0, 0, 0.7); }
    </style>
</head>
<body>
    <div class="tab-container">
        <div class="tab-bar">
            <!-- 기존 메뉴 구조 유지 -->
            <div class="dropdown"><div class="dropbtn">메일 ▾</div>
                <div class="dropdown-content">
                    <div onclick="loadPage('https://mail.office.hiworks.com/daemo.co.kr/')">개인메일</div>
                    <div onclick="loadPage('https://team-mail.office.hiworks.com/')">공용메일</div>
                </div>
            </div>
            <div class="dropdown"><div class="dropbtn">전자결재 ▾</div>
                <div class="dropdown-content">
                    <div onclick="loadPage('https://approval.office.hiworks.com/daemo.co.kr/approval/document/lists/A')">진행 중</div>
                    <div onclick="loadPage('https://approval.office.hiworks.com/daemo.co.kr/approval/document/box/all')">내문서</div>
                    <div onclick="loadPage('https://approval.office.hiworks.com/daemo.co.kr/approval/document/box/temp')">임시저장</div>
                </div>
            </div>
            <div class="dropdown"><div class="dropbtn">근무 ▾</div>
                <div class="dropdown-content">
                    <div onclick="loadPage('https://hr-work.office.hiworks.com/personal/my-status/vacation')">휴가 현황</div>
                    <div onclick="loadPage('https://hr-work.office.hiworks.com/approval/vacation-apply')">휴가신청</div>
                    <div onclick="loadPage('https://hr-work.office.hiworks.com/approval/overwork')">연장근무</div>
                    <div onclick="loadPage('https://hr-work.office.hiworks.com/approval/work-holiday')">휴(무)일근무</div>
                </div>
            </div>
            <div class="dropdown"><div class="dropbtn">예약 ▾</div>
                <div class="dropdown-content">
                    <div onclick="loadPage('https://booking.office.hiworks.com/daemo.co.kr/booking/bookingResource/resourceList/841')">회의실</div>
                    <div onclick="loadPage('https://booking.office.hiworks.com/daemo.co.kr/booking/bookingResource/resourceList/884')">노트북</div>
                    <div onclick="loadPage('https://booking.office.hiworks.com/daemo.co.kr/booking/bookingResource/resourceList/843')">차량</div>
                </div>
            </div>
            <div class="tab-item" onclick="loadPage('https://scheduler.office.hiworks.com/calendar')">일정</div>
            <div class="dropdown"><div class="dropbtn">게시판 ▾</div>
                <div class="dropdown-content">
                    <div onclick="loadPage('https://boards.office.hiworks.com/board/postlist/2540?page=1')">공지사항</div>
                    <div onclick="loadPage('https://boards.office.hiworks.com/board/postlist/2750?page=1')">주간메뉴</div>
                </div>
            </div>
        </div>

        <!-- 안드로이드 스타일 토글 스위치 -->
        <div class="toggle-container">
            <label class="switch">
                <input type="checkbox" id="sidebar-toggle" onchange="toggleSidebar(this.checked)">
                <span class="slider"></span>
            </label>
            <span id="status-text">사이드바 켬</span>
        </div>
        
        <div class="btn-external" onclick="openExternal()">외부에서 열기</div>
    </div>
    
    <div id="frame-wrapper" class="frame-wrapper">
        <iframe id="content-frame" src="https://login.office.hiworks.com/daemo.co.kr" sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-modals allow-downloads allow-storage-access-by-user-activation"></iframe>
    </div>

    <!-- 우하단 줌 컨트롤 -->
    <div class="zoom-controls">
        <button onclick="changeZoom(-0.1)">-</button>
        <button onclick="changeZoom(0.1)">+</button>
    </div>

    <script>
        const iframe = document.getElementById('content-frame');
        const frameWrapper = document.getElementById('frame-wrapper');
        const statusText = document.getElementById('status-text');
        let currentScale = 1.0;

        // 저장된 마지막 URL 복원
        const savedUrl = localStorage.getItem('hiworks_last_url');
        if (savedUrl) {
            iframe.src = savedUrl;
        }
        
        function loadPage(url) { 
            iframe.src = url; 
            try {
                localStorage.setItem('hiworks_last_url', url);
            } catch(e) {}
        }
        
        function openExternal() { 
            window.open(iframe.src, '_blank'); 
        }
        
        function toggleSidebar(isHidden) {
            if (isHidden) {
                frameWrapper.classList.add('sidebar-hidden');
                statusText.innerText = '사이드바 끔';
            } else {
                frameWrapper.classList.remove('sidebar-hidden');
                statusText.innerText = '사이드바 켬';
            }
        }

        function changeZoom(delta) {
            currentScale = Math.min(Math.max(0.5, currentScale + delta), 2.0);
            iframe.style.transform = `scale(${currentScale})`;
        }
    </script>
</body>
</html>
