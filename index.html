<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>하이웍스 통합 메뉴</title>
    <style>
        body { margin: 0; font-family: 'Malgun Gothic', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        /* 상단 탭 영역 */
        .tab-bar { display: flex; background: #333; padding: 10px; gap: 10px; }
        .tab-item { color: white; padding: 10px 20px; cursor: pointer; border-radius: 5px; background: #444; }
        .tab-item:hover { background: #ff7f00; }
        /* 하단 iframe 영역 */
        #content-frame { flex: 1; width: 100%; border: none; }
    </style>
</head>
<body>
    <div class="tab-bar">
        <div class="tab-item" onclick="loadPage('https://mails.office.hiworks.com/')">메일</div>
        <div class="tab-item" onclick="loadPage('https://approval.office.hiworks.com/daemo.co.kr/approval/document')">전자결재</div>
        <div class="tab-item" onclick="loadPage('https://boards.office.hiworks.com/board/postlist/recent')">게시판</div>
        <div class="tab-item" onclick="loadPage('https://scheduler.office.hiworks.com/')">일정</div>
        <div class="tab-item" onclick="loadPage('https://team-mail.office.hiworks.com/')">공용메일</div>
        <div class="tab-item" onclick="loadPage('https://booking.office.hiworks.com/daemo.co.kr/booking/bookingMain')">예약</div>
        <div class="tab-item" onclick="loadPage('https://hr-work.office.hiworks.com/')">근무</div>
    </div>
    <iframe id="content-frame" src="https://mails.office.hiworks.com/"></iframe>

    <script>
        function loadPage(url) {
            document.getElementById('content-frame').src = url;
        }
    </script>
</body>
</html>
