<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiworks 통합 포털</title>
    <style>
        :root {
            --brand-660c: #0067B1;
            --brand-646c: #3E72A2;
            --gold: #C5A059;
        }

        body { margin: 0; font-family: sans-serif; overflow: auto; }

        .tab-container {
            display: flex;
            background: var(--brand-660c);
            height: 45px;
            align-items: center;
        }

        .tab-bar { 
            display: flex; 
            overflow-x: auto;
            white-space: nowrap;
            flex: 1;
            -webkit-overflow-scrolling: touch;
        }

        .tab-item { 
            color: #ffffff; 
            padding: 0 15px; 
            cursor: pointer; 
            font-size: 14px; 
            line-height: 45px;
            flex-shrink: 0;
        }

        .tab-item.active { 
            background: var(--brand-646c);
            border-bottom: 2px solid var(--gold);
        }

        .btn-external {
            background: var(--gold);
            color: white;
            padding: 0 10px;
            font-size: 12px;
            cursor: pointer;
            line-height: 30px;
            margin-right: 10px;
            border-radius: 4px;
            white-space: nowrap;
        }

        #content-frame { 
            width: 100%; 
            min-width: 1200px; 
            height: calc(100vh - 45px); 
            border: none; 
            display: block;
        }
    </style>
</head>
<body>
    <div class="tab-container">
        <div class="tab-bar" id="tab-bar">
            <div class="tab-item active" onclick="loadPage(this, 'https://mails.office.hiworks.com/')">메일</div>
            <div class="tab-item" onclick="loadPage(this, 'https://team-mail.office.hiworks.com/')">공용메일</div>
            <div class="tab-item" onclick="loadPage(this, 'https://approval.office.hiworks.com/daemo.co.kr/approval/document')">전자결재</div>
            <div class="tab-item" onclick="loadPage(this, 'https://hr-work.office.hiworks.com/')">근무</div>
            <div class="tab-item" onclick="loadPage(this, 'https://booking.office.hiworks.com/daemo.co.kr/booking/bookingMain')">예약</div>
            <div class="tab-item" onclick="loadPage(this, 'https://scheduler.office.hiworks.com/')">일정</div>
            <div class="tab-item" onclick="loadPage(this, 'https://boards.office.hiworks.com/board/postlist/recent')">게시판</div>
        </div>
        <div class="btn-external" onclick="openExternal()">외부 브라우저로 열기</div>
    </div>
    
    <iframe id="content-frame" 
            src="https://mails.office.hiworks.com/" 
            sandbox="allow-forms allow-scripts allow-same-origin allow-popups">
    </iframe>

    <script>
        const iframe = document.getElementById('content-frame');

        function loadPage(element, url) {
            iframe.src = url;
            document.querySelectorAll('.tab-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            // 페이지가 바뀔 때마다 iframe에 포커스를 주어 단축키가 먹히게 유도
            iframe.focus();
        }

        function openExternal() {
            // contentWindow.location.href는 보안 정책상 타 도메인에서 가져올 수 없는 경우가 많음
            // 따라서 iframe의 현재 src를 기준으로 처리합니다.
            window.open(iframe.src, '_blank');
        }

        // iframe 내 클릭 발생 시 포커스를 iframe으로 강제하여 단축키 반응성 높임
        iframe.addEventListener('load', function() {
            iframe.contentWindow.document.addEventListener('click', function() {
                iframe.focus();
            });
        });
    </script>
</body>
</html>
