<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams in Daemo Hiworks</title>
    <style>
        :root {
            --brand-660c: #0067B1;
            --brand-646c: #3E72A2;
            --gold: #C5A059;
        }

        body { margin: 0; font-family: sans-serif; overflow: hidden; }

        .tab-container {
            display: flex;
            background: var(--brand-660c);
            height: 45px;
            align-items: center;
        }

        .tab-bar { 
            display: flex; 
            overflow-x: auto;
            white-space: nowrap;
            flex: 1;
            -webkit-overflow-scrolling: touch;
        }

        .tab-item-wrapper {
            display: flex;
            align-items: center;
            color: #ffffff;
            padding: 0 10px 0 15px;
            cursor: pointer;
            font-size: 14px;
            line-height: 45px;
            position: relative;
        }

        .tab-item-wrapper:hover { background: var(--brand-646c); }
        .tab-item-wrapper.active { background: var(--brand-646c); border-bottom: 2px solid var(--gold); }

        .external-icon {
            display: none;
            margin-left: 8px;
            width: 14px;
            height: 14px;
            opacity: 0.7;
        }
        .tab-item-wrapper:hover .external-icon { display: block; }
        .external-icon:hover { opacity: 1; transform: scale(1.1); }

        #content-frame { 
            width: 100%; 
            height: calc(100vh - 45px); 
            border: none; 
            display: block;
        }
    </style>
</head>
<body>
    <div class="tab-container">
        <div class="tab-bar" id="tab-bar">
            <!-- 탭 항목 반복 구조 -->
            <div class="tab-item-wrapper active" onclick="loadPage(this, 'https://mail.office.hiworks.com/daemo.co.kr/')">
                <span>메일</span>
                <img src="https://cdn-icons-png.flaticon.com/512/32/32338.png" class="external-icon" onclick="event.stopPropagation(); window.open('https://mail.office.hiworks.com/daemo.co.kr/', '_blank')">
            </div>
            <div class="tab-item-wrapper" onclick="loadPage(this, 'https://team-mail.office.hiworks.com/')">
                <span>공용메일</span>
                <img src="https://cdn-icons-png.flaticon.com/512/32/32338.png" class="external-icon" onclick="event.stopPropagation(); window.open('https://team-mail.office.hiworks.com/', '_blank')">
            </div>
            <div class="tab-item-wrapper" onclick="loadPage(this, 'https://approval.office.hiworks.com/daemo.co.kr/approval/document')">
                <span>전자결재</span>
                <img src="https://cdn-icons-png.flaticon.com/512/32/32338.png" class="external-icon" onclick="event.stopPropagation(); window.open('https://approval.office.hiworks.com/daemo.co.kr/approval/document', '_blank')">
            </div>
            <div class="tab-item-wrapper" onclick="loadPage(this, 'https://hr-work.office.hiworks.com/personal/index')">
                <span>근무</span>
                <img src="https://cdn-icons-png.flaticon.com/512/32/32338.png" class="external-icon" onclick="event.stopPropagation(); window.open('https://hr-work.office.hiworks.com/personal/index', '_blank')">
            </div>
            <div class="tab-item-wrapper" onclick="loadPage(this, 'https://booking.office.hiworks.com/daemo.co.kr/booking/bookingMain')">
                <span>예약</span>
                <img src="https://cdn-icons-png.flaticon.com/512/32/32338.png" class="external-icon" onclick="event.stopPropagation(); window.open('https://booking.office.hiworks.com/daemo.co.kr/booking/bookingMain', '_blank')">
            </div>
            <div class="tab-item-wrapper" onclick="loadPage(this, 'https://scheduler.office.hiworks.com/calendar')">
                <span>일정</span>
                <img src="https://cdn-icons-png.flaticon.com/512/32/32338.png" class="external-icon" onclick="event.stopPropagation(); window.open('https://scheduler.office.hiworks.com/calendar', '_blank')">
            </div>
            <div class="tab-item-wrapper" onclick="loadPage(this, 'https://boards.office.hiworks.com/board/postlist/recent?page=1')">
                <span>게시판</span>
                <img src="https://cdn-icons-png.flaticon.com/512/32/32338.png" class="external-icon" onclick="event.stopPropagation(); window.open('https://boards.office.hiworks.com/board/postlist/recent?page=1', '_blank')">
            </div>
        </div>
    </div>
    
    <iframe id="content-frame" src="https://login.office.hiworks.com/daemo.co.kr" sandbox="allow-forms allow-scripts allow-same-origin allow-popups"></iframe>

    <script>
        const iframe = document.getElementById('content-frame');

        function loadPage(element, url) {
            iframe.src = url;
            document.querySelectorAll('.tab-item-wrapper').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            iframe.focus();
        }
    </script>
</body>
</html>
